name: 自动打包点名器

on:
  push:
    tags:
      - 'v*' # 当你发布以 v 开头的标签（如 v2.8.1）时触发

# ==========================================
# 【核心漏洞修复】：显式声明写入权限
# ==========================================
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    # 强制开启 Node.js 24 模式，彻底消除版本弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          # 【终极降配核心】：强制使用 Python 3.8，完美兼容老旧 Win7 希沃白板！
          python-version: '3.8'

      - name: 安装依赖
        # 【V2.8.1 同步】：已彻底移除 Pillow 依赖，实现纯净极速构建
        run: |
          pip install pygame pyinstaller

      - name: 执行打包脚本
        # 【V2.8.1 同步】：增加 --clean 清除缓存，并强制注入 pygame 确保多媒体稳定
        run: |
          python -m PyInstaller --noconsole --onefile --clean --name "SmartPicker" --hidden-import=pygame dianming.py

      - name: 上传成品
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SmartPicker.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
