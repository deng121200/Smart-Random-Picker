name: 自动打包点名器

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install pygame pyinstaller

      - name: 执行打包脚本
        run: |
          python -m PyInstaller --noconsole --onefile --name "SmartPicker" dianming.py

      - name: 上传成品
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SmartPicker.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
