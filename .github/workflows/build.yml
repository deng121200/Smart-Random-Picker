name: 自动打包点名器

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    # 【优化项 1】强制开启 Node.js 24 模式，彻底消除版本弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        # 【优化项 2】增加了 requests，防止 PyInstaller 打包时报错罢工
        run: |
          pip install pygame pyinstaller requests

      - name: 执行打包脚本
        run: |
          python -m PyInstaller --noconsole --onefile --name "SmartPicker" dianming.py

      - name: 上传成品
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SmartPicker.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
