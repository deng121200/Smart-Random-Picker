name: SmartPicker V3.0 自动打包 (CMD语法版)

on:
  push:
    tags:
      - 'v*' # 当你发布以 v 开头的标签（如 v3.0.0）时触发

# ==========================================
# 【核心修复】使用纯CMD语法避免解析错误
# ==========================================
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      # 步骤1: 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2: 设置Python 3.8环境
      - name: 设置Python 3.8环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x64'

      # 步骤3: 安装依赖 (使用CMD语法)
      - name: 安装V3.0所有依赖
        shell: cmd
        run: |
          @echo off
          echo [步骤3] 开始安装依赖...
          
          pip install pygame==2.5.2
          if %ERRORLEVEL% NEQ 0 (
            echo ❌ pygame安装失败
            exit /b 1
          )
          
          pip install pywin32==306
          if %ERRORLEVEL% NEQ 0 (
            echo ❌ pywin32安装失败
            exit /b 1
          )
          
          pip install pyinstaller==5.13.2
          if %ERRORLEVEL% NEQ 0 (
            echo ❌ pyinstaller安装失败
            exit /b 1
          )
          
          echo ✅ 所有依赖安装完成!

      # 步骤4: 文件检查 (使用CMD语法)
      - name: 检查必要文件
        shell: cmd
        run: |
          @echo off
          echo [步骤4] 检查必要文件...
          
          if not exist "smartpicker_v3.py" (
            echo ❌ 错误: 未找到 smartpicker_v3.py
            echo 当前目录文件列表:
            dir /b
            exit /b 1
          )
          
          echo ✅ 找到主程序: smartpicker_v3.py
          
          REM 创建版本文件
          echo 3.0.0 > version.txt
          echo ✅ 创建版本文件: version.txt

      # 步骤5: 执行PyInstaller打包 (使用CMD语法)
      - name: 执行PyInstaller打包
        shell: cmd
        run: |
          @echo off
          echo [步骤5] 开始PyInstaller打包...
          
          REM 检查是否有图标文件
          if exist "icon.ico" (
            set ICON_OPTION=--icon=icon.ico
            echo ✅ 使用自定义图标
          ) else (
            set ICON_OPTION=
            echo ℹ️  未找到图标文件，使用默认图标
          )
          
          REM 执行打包命令
          echo 执行命令: pyinstaller --noconsole --onefile --clean --name "SmartPicker" --add-data "version.txt;." --hidden-import=pygame --hidden-import=win32com --hidden-import=win32com.client %ICON_OPTION% smartpicker_v3.py
          
          pyinstaller --noconsole --onefile --clean --name "SmartPicker" --add-data "version.txt;." --hidden-import=pygame --hidden-import=win32com --hidden-import=win32com.client %ICON_OPTION% smartpicker_v3.py
          
          if %ERRORLEVEL% NEQ 0 (
            echo ❌ PyInstaller打包失败
            exit /b 1
          )
          
          echo ✅ PyInstaller打包成功!

      # 步骤6: 验证打包结果 (使用CMD语法)
      - name: 验证打包结果
        shell: cmd
        run: |
          @echo off
          echo [步骤6] 验证打包结果...
          
          if not exist "dist\SmartPicker.exe" (
            echo ❌ 错误: 未生成可执行文件
            exit /b 1
          )
          
          REM 获取文件大小
          for %%F in ("dist\SmartPicker.exe") do set "SIZE=%%~zF"
          set /a SIZE_MB=%SIZE%/1048576
          
          echo ✅ 打包文件: dist\SmartPicker.exe
          echo 📦 文件大小: %SIZE_MB% MB
          
          REM 显示dist目录内容
          echo 📁 dist目录内容:
          dir /b dist

      # 步骤7: 创建便携版 (使用CMD语法)
      - name: 创建便携版ZIP
        shell: cmd
        run: |
          @echo off
          echo [步骤7] 创建便携版...
          
          REM 创建便携版目录
          if exist portable rd /s /q portable
          md portable
          
          REM 复制文件到便携版目录
          copy "dist\SmartPicker.exe" "portable\SmartPicker.exe"
          copy "smartpicker_v3.py" "portable\源码_backup.py" 2>nul
          
          if exist "名单.txt" (
            copy "名单.txt" "portable\名单.txt"
            echo ✅ 复制: 名单.txt
          ) else (
            echo ℹ️  创建示例名单文件
            echo 张三> portable\名单.txt
            echo 李四>> portable\名单.txt
            echo 王五>> portable\名单.txt
          )
          
          if exist "黑名单.txt" (
            copy "黑名单.txt" "portable\黑名单.txt"
            echo ✅ 复制: 黑名单.txt
          )
          
          REM 创建配置文件
          (
            echo # SmartPicker V3.0 配置文件
            echo # 首次运行时会自动创建
            echo.
            echo [GENERAL]
            echo version = 3.0.0
            echo language = zh_CN
            echo auto_check_update = true
            echo enable_logging = true
            echo log_level = INFO
            echo.
            echo [UI]
            echo theme = light
            echo animation_speed = medium
            echo font_family = Microsoft YaHei
            echo enable_animations = true
            echo.
            echo [PICKER]
            echo default_draw_count = 1
            echo max_draw_count = 20
            echo enable_blacklist = true
            echo voice_enabled = true
            echo voice_rate = 0
            echo voice_volume = 100
            echo.
            echo [AUDIO]
            echo enable_sound = true
            echo rolling_sound_volume = 80
            echo victory_sound_volume = 100
          ) > portable\config.ini
          
          echo ✅ 创建: config.ini
          
          REM 创建说明文件
          (
            echo ====================================
            echo SmartPicker V3.0 便携版
            echo ====================================
            echo 版本: 3.0.0
            echo 系统要求: Windows 7 SP1 (64位)
            echo.
            echo 包含文件:
            echo 1. SmartPicker.exe     - 主程序
            echo 2. 名单.txt            - 学生名单
            echo 3. 黑名单.txt          - 跳过名单（可选）
            echo 4. config.ini          - 配置文件
            echo 5. 源码_backup.py      - 源代码备份
            echo.
            echo 使用说明:
            echo 1. 解压到任意文件夹
            echo 2. 编辑 名单.txt 添加学生姓名
            echo 3. 双击 SmartPicker.exe 运行
            echo.
            echo 注意事项:
            echo - 无需安装 Python
            echo - 支持语音播报
            echo - 双击标题栏输入密码 114514 查看黑名单
            echo.
            echo 项目地址: https://github.com/deng121200/Smart-Random-Picker
            echo ====================================
          ) > portable\README.txt
          
          echo ✅ 创建: README.txt
          
          REM 创建ZIP文件
          powershell -Command "Compress-Archive -Path 'portable\*' -DestinationPath 'SmartPicker_V3.0.0_Portable.zip' -Force"
          
          if exist "SmartPicker_V3.0.0_Portable.zip" (
            for %%F in ("SmartPicker_V3.0.0_Portable.zip") do set "ZIP_SIZE=%%~zF"
            set /a ZIP_SIZE_MB=%ZIP_SIZE%/1048576
            echo ✅ 便携版创建完成: SmartPicker_V3.0.0_Portable.zip
            echo 📦 ZIP文件大小: %ZIP_SIZE_MB% MB
          ) else (
            echo ❌ ZIP文件创建失败
          )

      # 步骤8: 上传到GitHub Releases
      - name: 上传到GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SmartPicker.exe
            SmartPicker_V3.0.0_Portable.zip
            smartpicker_v3.py
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            # SmartPicker V3.0 发布
            
            ## 🚀 新特性
            - 语音播报功能（离线TTS）
            - 纯Tkinter动画引擎
            - 配置文件系统
            - Win7深度优化
            
            ## 📦 包含文件
            1. **SmartPicker.exe** - 单文件可执行程序
            2. **SmartPicker_V3.0.0_Portable.zip** - 便携版（含配置文件）
            3. **smartpicker_v3.py** - 源代码
            
            ## 🔧 使用说明
            1. 下载便携版并解压
            2. 编辑`名单.txt`添加学生姓名（每行一个）
            3. 运行`SmartPicker.exe`
            4. 如需语音，确保系统TTS可用
            
            ## 📖 配置说明
            所有设置可在`config.ini`中调整
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤9: 清理临时文件
      - name: 清理临时文件
        if: always()
        shell: cmd
        run: |
          @echo off
          echo [步骤9] 清理临时文件...
          
          REM 删除临时目录
          if exist build rd /s /q build
          if exist __pycache__ rd /s /q __pycache__
          if exist portable rd /s /q portable
          
          echo ✅ 临时文件清理完成
