name: 生成 SmartPicker 完整源码

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main, master ]
    paths:
      - 'generate_dianming.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        
    - name: 生成完整源码
      run: |
        python generate_dianming.py
        
    - name: 验证生成的文件
      run: |
        if [ -f "dianming.py" ]; then
          echo "✅ dianming.py 生成成功"
          echo "📊 文件大小: $(wc -c < dianming.py) 字节"
          echo "📝 代码行数: $(wc -l < dianming.py) 行"
        else
          echo "❌ dianming.py 生成失败"
          exit 1
        fi
        
    - name: 上传生成的文件
      uses: actions/upload-artifact@v4
      with:
        name: SmartPicker-完整源码
        path: dianming.py
        retention-days: 30
